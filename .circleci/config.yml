---
version: 2
jobs:
  lint:
    docker:
      - image: fedora:32
    steps:
      - run: dnf install -y git make
      - checkout
      - run:
          name: Install dependencies and run linters
          command: |
            make install-deps
            make venv
            source .venv/bin/activate
            pip install --require-hashes -r requirements/dev-requirements.txt
            make lint
  build-rpm:
    docker:
      - image: fedora:32
    steps:
      - run: dnf install -y git make
      - checkout
      - run:
          name: Build RPMs twice, ensure reproducibility
          command: |
            make install-deps
            PREFIX="/tmp/build_pass_"
            make build-rpm | tee "${PREFIX}1"
            make build-rpm | tee "${PREFIX}2"
            [ "$(tail -n 1 ${PREFIX}1)" == "$(tail -n 1 ${PREFIX}2)" ]
  test:
    docker:
      - image: fedora:32
    steps:
      - run: dnf install -y git make
      - checkout
      - run:
          name: Install dependencies and run tests
          command: |
            make install-deps
            make venv
            source .venv/bin/activate
            pip install --require-hashes -r requirements/dev-requirements.txt
            make test
  test-migration:
    docker:
      - image: fedora:32
    steps:
      - run: dnf install -y git make
      - checkout
      - run:
          name: Install dependencies and run migration tests
          command: |
            make install-deps
            curl https://raw.githubusercontent.com/QubesOS/qubes-qubes-release/master/qubes-dom0.repo.in | sed -e 's/$releasever/4.1/g' -e 's/%DIST%/fc32/g' > /etc/yum.repos.d/qubes-dom0.repo
            curl -o /etc/pki/rpm-gpg/RPM-GPG-KEY-qubes-4.1-primary https://raw.githubusercontent.com/QubesOS/qubes-qubes-release/master/RPM-GPG-KEY-qubes-4-primary
            make test-migration

workflows:
  version: 2
  securedrop_updater_ci:
    jobs:
      - lint
      - build-rpm
      - test
      - test-migration
