---
version: 2
jobs:
  lint:
    docker:
      - image: fedora:32
    steps:
      - run: dnf install -y git make
      - checkout
      - run:
          name: Install dependencies
          command: |
            make install-deps
            pip install --require-hashes -r requirements/dev-requirements.txt
      - run:
          name: Run linters
          command: make lint
  build-rpm:
    docker:
      - image: fedora:32
    steps:
      - run: dnf install -y git make
      - checkout
      - run:
          name: Install dependencies
          command: |
            make install-deps
            pip3 install --require-hashes -r requirements/dev-requirements.txt
      - run:
          name: Check reproducibility
          command: make check-reproducibility
  test:
    docker:
      - image: fedora:32
    steps:
      - run: dnf install -y git make
      - checkout
      - run:
          name: Install dependencies and run tests
          command: |
            make install-deps
            pip3 install --require-hashes -r requirements/dev-requirements.txt
      - run:
          name: Run tests
          command: make test
  test-migration:
    docker:
      - image: fedora:32
    steps:
      - run: dnf install -y git make
      - checkout
      - run:
          name: Install dependencies
          command: make install-deps
      - run:
          name: Run migration tests
          command: make test-migration

workflows:
  version: 2
  securedrop_updater_ci:
    jobs:
      - lint
      - build-rpm
      - test
      - test-migration
